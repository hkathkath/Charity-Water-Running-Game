<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Water Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Welcome to the Charity Water Game Prototype</h1>
  <div class="game">
    <div class="score-card">
      <div class="stat">
        <span class="label">TIME</span>
        <span class="score"></span>
      </div>
      <div class="stat">
        <span class="label">BEST</span>
        <span class="high-score"></span>
      </div>
    </div>

    <button id="start-button" class="start-button">Start Game</button>
    <button id="restart-button" class="hidden">Restart</button>

    <div id="can"></div>
    <div id="tree"></div>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
