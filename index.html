<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Water Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <img src="img/cw.png" alt="charity: water logo" class="logo">
  <div class="game">
    <div class="score-card">
      <div class="stat">
        <span class="label">TIME</span>
        <span class="score"></span>
      </div>
      <div class="stat">
        <span class="label">BEST</span>
        <span class="high-score"></span>
      </div>
    </div>

    <button id="start-button" class="start-button">Start Game</button>
    <button id="restart-button" class="hidden">Restart</button>

    <div id="can"></div>
    <div id="tree"></div>

    </div>
    
    <script src="script.js"></script>

    <footer class="footer">
      <div class="footer-row">
        <a href="https://www.charitywater.org/donate/the-spring" class="footer-left">Donate</a>
        <a href="https://www.charitywater.org/">charity: water</a>
        <a href="https://www.charitywater.org/our-work" class="footer-right">About Us</a>
      </div>
      <p>
      <br>
        © 2026 | charity: water game. All rights reserved.
      </p>
    </footer>
</body>
</html>
